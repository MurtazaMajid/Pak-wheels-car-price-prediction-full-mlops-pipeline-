version: "3.9"

services:
  car-price-api:
    build: .
    container_name: car-price-api
    ports:
      - "8000:8000"
    volumes:
      - ./xgb_best.json:/app/xgb_best.json:ro
      - ./X_train.csv:/app/X_train.csv:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
