name: MLOps CI/CD Pipeline

on:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/**"
      - "api/**"
      - "models/**"
      - "Dockerfile"
      - "requirements.txt"
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Force retrain even if no drift detected"
        required: false
        default: "false"

env:
  DOCKER_IMAGE: murtaza23/car-price-api
  DRIFT_THRESHOLD: "12.0"

jobs:

  # ── JOB 1: LEAKAGE CHECK ────────────────────────────────────────────────────
  leakage-check:
    name: Data Leakage Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install pandas numpy
      - run: python scripts/check_leakage.py

  # ── JOB 2: DRIFT CHECK ──────────────────────────────────────────────────────
  drift-check:
    name: Drift Detection
    runs-on: ubuntu-latest
    needs: leakage-check
    outputs:
      drift_detected: ${{ steps.drift.outputs.drift_detected }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install xgboost==2.1.4 pandas numpy scikit-learn
      - name: Run drift check
        id: drift
        run: |
          set +e
          python scripts/drift_check.py --threshold ${{ env.DRIFT_THRESHOLD }}
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 1 ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
          else
            echo "drift_detected=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload drift report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-report
          path: reports/
          if-no-files-found: ignore

  # ── JOB 3: RETRAIN ──────────────────────────────────────────────────────────
  retrain:
    name: Retrain Model
    runs-on: ubuntu-latest
    needs: drift-check
    env:
      MLFLOW_ALLOW_FILE_STORE: "true"
    if: |
      needs.drift-check.outputs.drift_detected == 'true' ||
      github.event.inputs.force_retrain == 'true'
    outputs:
      model_promoted: ${{ steps.compare.outputs.model_promoted }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install \
            "numpy<2.0" \
            "xgboost==2.1.4" \
            pandas scikit-learn \
            "shap==0.46.0" \
            optuna \
            "mlflow==2.22.1" \
            sqlalchemy \
            yfinance \
            matplotlib

      - name: Prepare data
        run: python scripts/prepare_data.py

      - name: Run leakage check on fresh data
        run: python scripts/check_leakage.py

      - name: Patch and run retrain script
        shell: python
        run: |
          content = open('scripts/train_model.py').read()
          content = content.replace('xgb_best.json', 'xgb_new.json')
          open('scripts/train_new.py', 'w').write(content)

      - name: Run retrain
        run: python scripts/train_new.py

      - name: Compare new vs current model
        id: compare
        run: |
          set +e
          python scripts/compare_models.py
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 1 ]; then
            echo "model_promoted=true" >> $GITHUB_OUTPUT
          else
            echo "model_promoted=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: retrain-artifacts
          path: |
            mlruns/
            reports/
          if-no-files-found: ignore

      - name: Commit new model to repo
        if: steps.compare.outputs.model_promoted == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git clean -fd
          git fetch origin main
          git reset --hard origin/main
          git add models/xgb_best.json reports/
          git commit -m "chore: auto-retrain — new model promoted [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── JOB 4: DOCKER BUILD & PUSH ──────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: retrain
    if: needs.retrain.outputs.model_promoted == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── JOB 5: DEPLOY TO EC2 ────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker
    if: needs.docker.result == 'success'
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull murtaza23/car-price-api:latest
            sudo docker stop car-price-api || true
            sudo docker rm car-price-api || true
            sudo docker run -d -p 8000:8000 --name car-price-api \
              murtaza23/car-price-api:latest
            sudo docker image prune -f
            echo "Deployment complete — API live at http://${{ vars.EC2_HOST }}:8000"
